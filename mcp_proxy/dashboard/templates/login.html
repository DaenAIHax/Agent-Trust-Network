<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — Cullis MCP Proxy</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@400;500;600;700&family=DM+Sans:wght@400;500;600&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        surface: { 950:'#0a0f1a', 900:'#111827', 800:'#1a1f2e' },
                        accent: { 400:'#00e5c7', 500:'#00c9ae' },
                    }
                }
            }
        }
    </script>
    <style>
        body { font-family: 'DM Sans', sans-serif; background: #0a0f1a; }
        @keyframes fade-up {
            from { opacity: 0; transform: translateY(12px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .fade-up { animation: fade-up 0.5s ease-out; }
        @keyframes glow-pulse {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 0.8; }
        }
        .glow-pulse { animation: glow-pulse 4s ease-in-out infinite; }
        input:focus {
            outline: none;
            border-color: #00e5c7;
            box-shadow: 0 0 0 2px rgba(0, 229, 199, 0.15);
        }
    </style>
</head>
<body class="h-full flex items-center justify-center">

<!-- Background radial glow -->
<div class="glow-pulse" style="position:fixed;top:50%;left:50%;width:700px;height:700px;transform:translate(-50%,-50%);background:radial-gradient(circle, rgba(0,229,199,0.05) 0%, rgba(14,165,233,0.02) 40%, transparent 70%);pointer-events:none;z-index:0;"></div>

<!-- Grid pattern overlay -->
<div style="position:fixed;inset:0;background-image:linear-gradient(rgba(255,255,255,0.015) 1px, transparent 1px),linear-gradient(90deg, rgba(255,255,255,0.015) 1px, transparent 1px);background-size:48px 48px;pointer-events:none;z-index:0;"></div>

<div class="w-full max-w-md relative z-10 fade-up">
    <!-- Brand -->
    <div class="text-center mb-10">
        <div class="inline-flex items-center justify-center gap-3 mb-3">
            <div class="w-12 h-12 rounded-lg bg-surface-900 border border-gray-800/60 flex items-center justify-center" style="box-shadow: 0 0 30px rgba(0,229,199,0.08);">
                <svg class="w-6 h-6" style="color: #00e5c7;" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 3v2m6-2v2M9 19v2m6-2v2M5 9H3m2 6H3m18-6h-2m2 6h-2M7 19h10a2 2 0 002-2V7a2 2 0 00-2-2H7a2 2 0 00-2 2v10a2 2 0 002 2zM9 9h6v6H9V9z"/></svg>
            </div>
        </div>
        <h1 style="font-family: 'Chakra Petch', sans-serif; font-weight: 600; font-size: 1.5rem; text-transform: uppercase; letter-spacing: 0.2em; color: white;">
            Cullis <span style="color: #00e5c7;">MCP</span> Proxy
        </h1>
        <p class="text-xs text-gray-600 mt-2 uppercase tracking-[0.15em]">Enterprise Control Plane</p>
    </div>

    {% if error %}
    <div class="mb-4 p-3 bg-red-500/10 border border-red-500/20 rounded text-sm text-red-400">{{ error }}</div>
    {% endif %}

    <!-- Login card -->
    <div class="bg-surface-900/60 border border-gray-800/50 rounded-lg p-6 backdrop-blur-sm" style="box-shadow: 0 0 40px rgba(0,229,199,0.03);">
        <form method="post" action="/proxy/login" class="space-y-5">
            <div>
                <label class="block text-xs font-medium text-gray-400 mb-1.5 uppercase tracking-wider">Broker URL</label>
                <input type="url" name="broker_url" required autocomplete="url"
                       placeholder="https://broker.example.com"
                       class="w-full bg-surface-950 border border-gray-700/60 rounded px-3 py-2.5 text-sm text-white placeholder-gray-600 transition-all">
                <p class="text-[10px] text-gray-600 mt-1">The Cullis trust broker your organization will connect to</p>
            </div>
            <div>
                <label class="block text-xs font-medium text-gray-400 mb-1.5 uppercase tracking-wider">Invite Token</label>
                <input type="text" name="invite_token" required autocomplete="off"
                       placeholder="Paste invite token here"
                       class="w-full bg-surface-950 border border-gray-700/60 rounded px-3 py-2.5 text-sm text-white placeholder-gray-600 transition-all"
                       style="font-family: 'JetBrains Mono', monospace;">
                <p class="text-[10px] text-gray-600 mt-1">Provided by the broker administrator</p>
            </div>
            <button type="submit"
                    class="w-full px-4 py-3 text-sm font-semibold rounded transition-all"
                    style="font-family: 'Chakra Petch', sans-serif; background: #00e5c7; color: #0a0f1a; letter-spacing: 0.08em; text-transform: uppercase;"
                    onmouseover="this.style.background='#fff'; this.style.boxShadow='0 0 30px rgba(0,229,199,0.2)'; this.style.transform='translateY(-1px)'"
                    onmouseout="this.style.background='#00e5c7'; this.style.boxShadow='none'; this.style.transform='none'">
                Connect to Broker
            </button>
        </form>
    </div>

    <p class="text-center text-[10px] text-gray-700 mt-8 uppercase tracking-widest">
        Cullis Agent Trust Network
    </p>
</div>
</body>
</html>
