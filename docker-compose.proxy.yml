# =============================================================================
# Cullis MCP Proxy — Standalone Docker Compose
# =============================================================================
#
# The MCP Proxy is the org-level gateway that handles identity, certificates,
# and broker communication on behalf of internal AI agents.
#
# Usage:
#   docker compose -f docker-compose.proxy.yml up -d
#
# Environment variables (set in proxy.env or pass via -e):
#   MCP_PROXY_ENVIRONMENT    - "development" or "production" (default: development)
#   MCP_PROXY_ADMIN_SECRET   - Dashboard admin password (CHANGE IN PRODUCTION)
#
# The proxy stores its data (agents, config, audit log) in a SQLite database
# persisted via the mcp_proxy_data volume.
#
# On first run, open http://localhost:9100/proxy/login to:
#   1. Connect to your Cullis broker
#   2. Register your organization
#   3. Create agents
# =============================================================================

services:

  mcp-proxy:
    build:
      context: .
      dockerfile: mcp_proxy/Dockerfile
    ports:
      - "${MCP_PROXY_PORT:-9100}:9100"
    environment:
      MCP_PROXY_ENVIRONMENT: ${MCP_PROXY_ENVIRONMENT:-development}
      MCP_PROXY_ADMIN_SECRET: ${MCP_PROXY_ADMIN_SECRET:-change-me-in-production}
      MCP_PROXY_DATABASE_URL: sqlite+aiosqlite:////data/mcp_proxy.db
      # Vault (optional — uncomment to enable)
      # MCP_PROXY_SECRET_BACKEND: vault
      # MCP_PROXY_VAULT_ADDR: http://vault:8200
      # MCP_PROXY_VAULT_TOKEN: ${VAULT_TOKEN:-dev-root-token}
    volumes:
      - mcp_proxy_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:9100/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # Optional: HashiCorp Vault for secure key storage
  # Uncomment this section to store agent private keys in Vault
  # instead of the local SQLite database.
  #
  # vault:
  #   image: hashicorp/vault:1.17
  #   ports:
  #     - "8200:8200"
  #   environment:
  #     VAULT_DEV_ROOT_TOKEN_ID: ${VAULT_TOKEN:-dev-root-token}
  #     VAULT_DEV_LISTEN_ADDRESS: "0.0.0.0:8200"
  #   cap_add:
  #     - IPC_LOCK
  #   healthcheck:
  #     test: ["CMD", "vault", "status", "-address=http://localhost:8200"]
  #     interval: 5s
  #     timeout: 5s
  #     retries: 10

volumes:
  mcp_proxy_data:
    driver: local
