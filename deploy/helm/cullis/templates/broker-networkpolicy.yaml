{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "cullis.broker.fullname" . }}
  labels:
    {{- include "cullis.broker.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "cullis.broker.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Ingress controller namespace — only the nginx ingress controller
    # is allowed to reach the broker pods directly.
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ .Values.networkPolicy.ingressNamespace | quote }}
      ports:
        - protocol: TCP
          port: {{ .Values.broker.containerPort }}
    # Allow Prometheus to scrape /metrics from inside any namespace
    # that labels itself as monitoring.
    {{- if .Values.broker.prometheusEnabled }}
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
      ports:
        - protocol: TCP
          port: {{ .Values.broker.containerPort }}
    {{- end }}
  egress:
    # DNS
    - to:
        - namespaceSelector: {}
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    {{- if .Values.postgres.internal }}
    - to:
        - podSelector:
            matchLabels:
              {{- include "cullis.postgres.selectorLabels" . | nindent 14 }}
      ports:
        - protocol: TCP
          port: {{ .Values.postgres.port }}
    {{- else }}
    # External Postgres — allow egress to any IP on the DB port. Tighten
    # by setting extraEgress with a specific ipBlock if you know the CIDR.
    - to:
        - ipBlock:
            cidr: 0.0.0.0/0
            except:
              - 169.254.0.0/16
      ports:
        - protocol: TCP
          port: 5432
    {{- end }}
    {{- if .Values.redis.internal }}
    - to:
        - podSelector:
            matchLabels:
              {{- include "cullis.redis.selectorLabels" . | nindent 14 }}
      ports:
        - protocol: TCP
          port: {{ .Values.redis.port }}
    {{- else }}
    - to:
        - ipBlock:
            cidr: 0.0.0.0/0
            except:
              - 169.254.0.0/16
      ports:
        - protocol: TCP
          port: 6379
    {{- end }}
    {{- if .Values.vault.internal }}
    - to:
        - podSelector:
            matchLabels:
              {{- include "cullis.vault.selectorLabels" . | nindent 14 }}
      ports:
        - protocol: TCP
          port: {{ .Values.vault.port }}
    {{- else }}
    # External Vault — allow egress to HTTPS (443) and the Vault API
    # default (8200). Restrict via extraEgress in production.
    - to:
        - ipBlock:
            cidr: 0.0.0.0/0
            except:
              - 169.254.0.0/16
      ports:
        - protocol: TCP
          port: 8200
        - protocol: TCP
          port: 443
    {{- end }}
    {{- if .Values.jaeger.enabled }}
    - to:
        - podSelector:
            matchLabels:
              {{- include "cullis.jaeger.selectorLabels" . | nindent 14 }}
      ports:
        - protocol: TCP
          port: {{ .Values.jaeger.otlpGrpcPort }}
    {{- end }}
    # HTTPS egress for PDP webhook, OIDC discovery, ACME HTTP-01 callbacks.
    - to:
        - ipBlock:
            cidr: 0.0.0.0/0
            except:
              - 169.254.0.0/16
      ports:
        - protocol: TCP
          port: 443
    {{- with .Values.networkPolicy.extraEgress }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
{{- end }}
