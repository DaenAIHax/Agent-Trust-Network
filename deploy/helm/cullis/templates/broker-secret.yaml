{{- if .Values.secrets.create }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "cullis.broker.secretName" . }}
  labels:
    {{- include "cullis.broker.labels" . | nindent 4 }}
  annotations:
    # Allow SealedSecrets / ExternalSecrets controllers to adopt the same
    # name without Helm overwriting their managed data on upgrade.
    helm.sh/resource-policy: keep
type: Opaque
stringData:
  ADMIN_SECRET: {{ .Values.secrets.adminSecret | default (randAlphaNum 48) | quote }}
  {{- if .Values.secrets.dashboardSigningKey }}
  DASHBOARD_SIGNING_KEY: {{ .Values.secrets.dashboardSigningKey | quote }}
  {{- end }}
  DATABASE_URL: {{ include "cullis.databaseUrl" . | quote }}
  REDIS_URL: {{ include "cullis.redisUrl" . | quote }}
  {{- if .Values.vault.internal }}
  VAULT_TOKEN: {{ .Values.vault.devRootToken | quote }}
  {{- else if .Values.secrets.vaultToken }}
  VAULT_TOKEN: {{ .Values.secrets.vaultToken | quote }}
  {{- end }}
  {{- if .Values.secrets.oidcClientSecret }}
  ADMIN_OIDC_CLIENT_SECRET: {{ .Values.secrets.oidcClientSecret | quote }}
  {{- end }}
  {{- if .Values.secrets.anthropicApiKey }}
  ANTHROPIC_API_KEY: {{ .Values.secrets.anthropicApiKey | quote }}
  {{- end }}
  {{- range $k, $v := .Values.secrets.extra }}
  {{ $k }}: {{ $v | quote }}
  {{- end }}
{{- end }}
