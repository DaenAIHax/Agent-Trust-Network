{{- if .Values.jaeger.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "cullis.jaeger.fullname" . }}
  labels:
    {{- include "cullis.jaeger.labels" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "cullis.jaeger.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "cullis.jaeger.selectorLabels" . | nindent 8 }}
    spec:
      containers:
        - name: jaeger
          image: {{ .Values.jaeger.image }}
          imagePullPolicy: IfNotPresent
          env:
            - name: COLLECTOR_OTLP_ENABLED
              value: "true"
          ports:
            - name: otlp-grpc
              containerPort: {{ .Values.jaeger.otlpGrpcPort }}
              protocol: TCP
            - name: ui
              containerPort: {{ .Values.jaeger.uiPort }}
              protocol: TCP
          readinessProbe:
            httpGet:
              path: /
              port: ui
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "cullis.jaeger.fullname" . }}
  labels:
    {{- include "cullis.jaeger.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - name: otlp-grpc
      port: {{ .Values.jaeger.otlpGrpcPort }}
      targetPort: otlp-grpc
      protocol: TCP
    - name: ui
      port: {{ .Values.jaeger.uiPort }}
      targetPort: ui
      protocol: TCP
  selector:
    {{- include "cullis.jaeger.selectorLabels" . | nindent 4 }}
{{- end }}
