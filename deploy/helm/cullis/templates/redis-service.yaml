{{- if .Values.redis.internal }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "cullis.redis.fullname" . }}
  labels:
    {{- include "cullis.redis.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  clusterIP: None
  ports:
    - name: redis
      port: {{ .Values.redis.port }}
      targetPort: redis
      protocol: TCP
  selector:
    {{- include "cullis.redis.selectorLabels" . | nindent 4 }}
{{- end }}
