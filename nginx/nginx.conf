server {
    listen 443 ssl;
    server_name localhost;

    ssl_certificate     /etc/nginx/certs/server.pem;
    ssl_certificate_key /etc/nginx/certs/server-key.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5:!RC4;
    ssl_prefer_server_ciphers on;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;

    # Request size limit
    client_max_body_size 2m;

    # ────────────────────────────────────────────────────────────────────
    # Optional: mTLS client authentication (RFC 8705 binding)
    # ────────────────────────────────────────────────────────────────────
    # Uncomment to enforce certificate binding at the TLS layer. The broker
    # verifies that the forwarded client cert matches the cert in the JWT
    # client_assertion. Set MTLS_BINDING=optional|required in the broker
    # environment to activate enforcement.
    #
    # ssl_verify_client optional;
    # ssl_client_certificate /etc/nginx/certs/trusted-orgs-bundle.pem;
    #
    # SECURITY — header spoofing: proxy_set_header ALWAYS overwrites any
    # X-SSL-Client-Cert a client may have injected in the original request.
    # This is critical. Without mTLS termination AND without this
    # overwrite, an attacker could forge the header and impersonate any
    # cert. Every reverse-proxy layer in front of the broker (LB → ingress
    # → nginx) must either terminate mTLS and set this header from
    # $ssl_client_escaped_cert, or strip it entirely before forwarding.
    #
    # proxy_set_header X-SSL-Client-Cert $ssl_client_escaped_cert;
    # ────────────────────────────────────────────────────────────────────

    # WebSocket support
    location /v1/broker/ws {
        proxy_pass http://broker:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
    }

    location /broker/ws {
        proxy_pass http://broker:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
    }

    # All other traffic
    location / {
        proxy_pass http://broker:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# Redirect HTTP to HTTPS
server {
    listen 80;
    server_name localhost;
    return 301 https://$host$request_uri;
}
