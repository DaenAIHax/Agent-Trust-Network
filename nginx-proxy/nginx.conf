# ═══════════════════════════════════════════════════════════════════════════════
# Cullis — nginx HTTPS terminator for the MCP proxy dashboard (dev profile)
# ═══════════════════════════════════════════════════════════════════════════════
#
# This file is a baseline template. ./deploy_proxy.sh --dev overwrites it with
# the correct server_name derived from --public-url on each invocation.
#
# Listens on 443 inside the container (published as 9443 on the host so we
# don't need to bind to a privileged port). Proxies everything to the
# mcp-proxy container on its internal HTTP port 9100.
# ═══════════════════════════════════════════════════════════════════════════════

server {
    listen 443 ssl;
    server_name localhost;

    ssl_certificate     /etc/nginx/certs/server.pem;
    ssl_certificate_key /etc/nginx/certs/server-key.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5:!RC4;
    ssl_prefer_server_ciphers on;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    client_max_body_size 2m;

    # Upstream = the mcp-proxy container on the shared dev network.
    location / {
        proxy_pass http://mcp-proxy:9100;
        proxy_http_version 1.1;
        proxy_set_header Host               $host;
        proxy_set_header X-Real-IP          $remote_addr;
        proxy_set_header X-Forwarded-For    $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto  $scheme;
        proxy_set_header Upgrade            $http_upgrade;
        proxy_set_header Connection         $http_connection;
        proxy_read_timeout                  86400;
    }
}
